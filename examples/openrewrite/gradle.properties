#org.gradle.parallel=true
#org.gradle.caching=true
org.gradle.workers.max=6
org.gradle.jvmargs=-Xmx3g
# Stop publishing the .sha256 and .sha512 artifacts, as we're seeing more aggressive 429 responses from Maven Central
systemProp.org.gradle.internal.publish.checksums.insecure=true

org.gradle.configuration-cache=false
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.daemon=false
org.gradle.console=plain

systemProp.javax.net.ssl.trustStore=../../pki/truststore.jks
systemProp.javax.net.ssl.trustStorePassword=changeit

# Doesn't work. You have to use _JAVA_OPTIONS=-Djdk.net.hosts.file=../../hosts.txt
#org.gradle.jvmargs=-Djdk.net.hosts.file=../../hosts.txt